{% extends "base.html" %}
{% block content %}
<h1>最低訂購量 (MOQ)</h1>
<div class="card">
    <h3>上傳MOQ CSV</h3>
    <form action="/reference/moq/import" method="POST" enctype="multipart/form-data">
        <input type="file" name="file" accept=".csv" required>
        <label>格式: SKU, MOQ</label>
        <button type="submit" class="btn">上傳</button>
    </form>
</div>
<table class="table"><tr><th>SKU</th><th>MOQ</th></tr>
{% for r in data.rows %}<tr><td>{{ r.sku }}</td><td>{{ r.moq }}</td></tr>{% endfor %}
</table>
{% endblock %}
